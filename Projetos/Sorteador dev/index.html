<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Sorteador de Números DEV</title>
</head>

<body>
    <div class="sortear">
        <img src="/assets/logo.png" alt="sortear">
        <p>Versão melhorada (2.0)</p>
        <h2></h2>
        <input type="number" id="min" placeholder="Menor Valor">
        <input type="number" id="max" placeholder="Maior Valor">
        <button onclick="play()">Sortear</button>
    </div>
</body>
<script src="/scripts.js"></script>
</html>
