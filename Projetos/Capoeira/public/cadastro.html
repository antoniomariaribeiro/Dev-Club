<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Capoeira Nacional</title>
  <link rel="stylesheet" href="style/style.css">
</head>
<body>
  <div class="container">
    <h2>Cadastro</h2>
    <form id="cadastroForm">
  <input type="text" id="cadastroNome" placeholder="Nome" required>
  <input type="email" id="cadastroEmail" placeholder="E-mail" required>
  <input type="text" id="cadastroCPF" placeholder="CPF" required maxlength="14">
  <input type="tel" id="cadastroTelefone" placeholder="Telefone" required maxlength="15">
  <input type="password" id="cadastroSenha" placeholder="Senha" required>
  <button type="submit">Cadastrar</button>
   <div class="extra-links">
    </form>
    <p>Já tem conta? <a id="troca" href="login.html">Entrar</a></p>
    <div id="cadastroMsg"></div>
  </div>
  </div>
 
</body>
<script src="js/cadastro.js"></script>
</html>
