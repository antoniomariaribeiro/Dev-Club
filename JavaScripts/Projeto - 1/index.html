<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=3, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=League+Gothic&family=Poppins:ital,wght@0,400;0,700;&family=Roboto:ital@0;1&display=swap" rel="stylesheet">
    <title>Conversor de moedas</title>
</head>

<body>
    <img class="logo-img" src="/assets/Logo-sem-fundo.png" alt="Logo">
    <h1>Conversor de moedas</h1>

    <main>
        <label class="" for="">
            Converter <b>de:</b>
            <select class="currency-select-to-converted" name="" id="converter">
                <option value="BRL">R$ Real Brasileiro</option>
                <option value="USD">US$ Dolar Americano</option>
                <option value="EUR">€ Euro</option>
                <option value="GBP">£ Libra</option>
                <option value="JPY">¥ Iene</option>
                <option value="BTC">₿ Bitcoin</option>
            </select>
        </label>

        <label class="" for="">
            Converter <b>para:</b>
            <select class="currency-select" name="" id="convertida">
                <option value="USD">US$ Dolar Americano</option>
                <option value="BRL">R$ Real Brasileiro</option>
                <option value="EUR">€ Euro</option>
                <option value="GBP">£ Libra</option>
                <option value="JPY">¥ Iene</option>
                <option value="BTC">₿ Bitcoin</option>
            </select>

        </label>

        <label class="value-to-be-converted" for="">
            Valor:
            <input class="input-currency" placeholder="R$ 10.000,00">
        </label>

        <button class="convert-on-click">Converter</button>

            <section class="currency">
                <div class="currency-box">
                    <img class="logo-a-converter" id="" src=" /assets/brasil.png" alt="logo-moeda-a-converter">
                    <p class="currency" id="currency-origem" value="real">R$ Real</p>
                    <p class="currency-daMoeda" id="converter">0,00</p>
                </div>

                <img class="arrow" src="/assets/arrow.png" alt="seta">

                <div class="currency-box">
                    <img class="logo-convertida" src="/assets/dolar.png" alt="logo-moeda-convertida">
                    <p class="currency" id="currency-name" value="dolar" >US$ Dolar Amereicano</p>
                    <p class="currency-paraMoeda" id="convertida">0,00</p>
                </div>
            </section>

    </main>
</body>
<script src="/script.js"></script>

</html>
